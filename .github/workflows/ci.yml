name: OptiServe CI Pipeline

# 언제 이 자동화 작업이 실행될 것인가? (main 브랜치에 push 될 때마다)
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    # 깃허브가 무료로 빌려주는 우분투(Linux) 서버에서 실행
    runs-on: ubuntu-latest

    steps:
    # 1. 내 깃허브 레포지토리의 코드를 우분투 서버로 복사해옵니다.
    - name: Checkout repository
      uses: actions/checkout@v3

    # 2. 파이썬 3.11 환경을 세팅합니다.
    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: "3.11"

    # 3. 필요한 라이브러리(requirements.txt)를 설치합니다.
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    # 4. 어제 만든 pytest 명령어를 깃허브 서버가 대신 실행합니다!
    - name: Run Pytest
      run: |
        python -m pytest