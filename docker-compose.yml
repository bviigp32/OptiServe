version: '3.8'

services:
  redis:
    image: redis:alpine
    container_name: optiserve_redis
    ports:
      - "6379:6379"

  api:
    build: .
    container_name: optiserve_api
    ports:
      - "8000:8000"
    command: uvicorn src.main:app --host 0.0.0.0 --port 8000
    depends_on:
      - redis 

  dashboard:
    build: .
    container_name: optiserve_dashboard
    ports:
      - "8501:8501"
    command: streamlit run src/dashboard.py --server.address=0.0.0.0
    depends_on:
      - api